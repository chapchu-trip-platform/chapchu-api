name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            PR #${{ github.event.pull_request.number }} 하네스 엔지니어링 리뷰를 수행하라.

            ## 절차
            1. `gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }}` 로 diff 가져오기
            2. `docs/decisions/`, `docs/failures/`, `AGENTS.md` 읽기
            3. 리뷰 작성 후 Write 도구로 `/tmp/review.md`에 저장

            ## 리뷰 기준
            1. **레이어 규칙**: Controller → Service → Repository → Model 단방향 의존성 위반
            2. **패키지 위치**: com.pettrip.{domain}.{controller|service|repository|model}
            3. **PK 정책**: @GeneratedValue 금지, UUID.randomUUID() 금지, BaseEntity 상속 필수
            4. **TDD**: Controller 추가 시 @WebMvcTest + REST Docs 스니펫 필수
            5. **Flyway**: 기존 마이그레이션 파일 수정 절대 금지
            6. **코드 품질**: 버그 가능성, 예외 처리, 성능

            ## 출력 형식 (한국어)
            - 심각도: 🔴 필수수정 / 🟡 권장 / 🟢 참고
            - 전체 요약 + 항목별 상세

      - name: Post review comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/review.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body-file /tmp/review.md
          fi
