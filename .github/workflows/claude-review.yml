name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

jobs:
  review:
    # fix/claude-* 브랜치는 자동 생성된 수정 PR — 재리뷰 루프 방지
    if: "!startsWith(github.event.pull_request.head.ref, 'fix/claude-')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1단계: 리뷰 ──────────────────────────────────────────────────────────
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            PR #${{ github.event.pull_request.number }} 하네스 엔지니어링 리뷰를 수행하라.

            ## 절차
            1. `gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }}` 로 diff 가져오기
            2. `docs/decisions/`, `docs/failures/`, `AGENTS.md` 읽기
            3. 리뷰 작성 후 Write 도구로 `/tmp/review.md`에 저장
            4. 🔴 필수수정 항목이 있으면 `/tmp/has_critical.txt` 파일에 "true" 저장, 없으면 저장하지 않음

            ## 리뷰 기준
            1. **레이어 규칙**: Controller → Service → Repository → Model 단방향 의존성 위반
            2. **패키지 위치**: com.pettrip.{domain}.{controller|service|repository|model}
            3. **PK 정책**: @GeneratedValue 금지, UUID.randomUUID() 금지, BaseEntity 상속 필수
            4. **TDD**: Controller 추가 시 @WebMvcTest + REST Docs 스니펫 필수
            5. **Flyway**: 기존 마이그레이션 파일 수정 절대 금지
            6. **코드 품질**: 버그 가능성, 예외 처리, 성능

            ## 출력 형식 (한국어)
            - 심각도: 🔴 필수수정 / 🟡 권장 / 🟢 참고
            - 전체 요약 + 항목별 상세

      - name: Post review comment
        id: post-review
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/review.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body-file /tmp/review.md
          fi
          if [ -f /tmp/has_critical.txt ]; then
            echo "has_critical=true" >> $GITHUB_OUTPUT
          else
            echo "has_critical=false" >> $GITHUB_OUTPUT
          fi

      # ── 2단계: 자동 fix (PR당 최대 3회) ────────────────────────────────────
      - name: Check fix attempt count
        id: check-attempts
        if: steps.post-review.outputs.has_critical == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          COUNT=$(git branch -r | grep -c "origin/fix/claude-${PR_NUM}-" || true)
          if [ "$COUNT" -ge 3 ]; then
            echo "max_reached=true" >> $GITHUB_OUTPUT
            gh pr comment ${PR_NUM} \
              --repo ${{ github.repository }} \
              --body "⚠️ Claude 자동 수정이 이미 3회 시도되었습니다. 이후 수정은 수동으로 진행해 주세요."
          else
            echo "max_reached=false" >> $GITHUB_OUTPUT
            ATTEMPT=$((COUNT + 1))
            FIX_BRANCH="fix/claude-${PR_NUM}-${ATTEMPT}"
            git config user.name "claude[bot]"
            git config user.email "claude[bot]@users.noreply.github.com"
            git checkout -b "$FIX_BRANCH" origin/${{ github.event.pull_request.head.ref }}
            echo "$FIX_BRANCH" > /tmp/fix_branch.txt
            echo "attempt=$ATTEMPT" >> $GITHUB_OUTPUT
          fi

      - uses: anthropics/claude-code-action@v1
        if: |
          steps.post-review.outputs.has_critical == 'true' &&
          steps.check-attempts.outputs.max_reached == 'false'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            `/tmp/review.md`에 기록된 🔴 필수수정 항목들을 코드에서 직접 수정하라.

            ## 절차
            1. `/tmp/review.md` 읽기
            2. 🔴 항목에 해당하는 코드 파일을 Edit/Write 도구로 수정

            ## 금지사항
            - git commit, git push, gh 명령 실행 금지 — 파일 수정만 하라
            - `.github/` 디렉터리 파일 수정 금지
            - 🟡 권장 항목 수정 금지

      - name: Commit and open fix PR
        if: |
          steps.post-review.outputs.has_critical == 'true' &&
          steps.check-attempts.outputs.max_reached == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FIX_BRANCH=$(cat /tmp/fix_branch.txt 2>/dev/null || echo "")
          if [ -z "$FIX_BRANCH" ]; then exit 0; fi

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit — skipping fix PR"
            exit 0
          fi

          git commit -m "fix: Claude 리뷰 필수수정 반영"
          git push origin "$FIX_BRANCH"

          ATTEMPT=${{ steps.check-attempts.outputs.attempt }}
          BASE_BRANCH="${{ github.event.pull_request.head.ref }}"

          gh pr create \
            --repo ${{ github.repository }} \
            --head "$FIX_BRANCH" \
            --base "$BASE_BRANCH" \
            --title "fix: Claude 리뷰 필수수정 반영 — PR #${{ github.event.pull_request.number }} (${ATTEMPT}/3)" \
            --body "PR #${{ github.event.pull_request.number }} 리뷰에서 발견된 🔴 필수수정 항목 자동 수정 (${ATTEMPT}/3회차).

          원본 리뷰: PR #${{ github.event.pull_request.number }} 코멘트 참고.

          > ⚠️ 자동 생성 PR입니다. 머지 전 내용을 확인하세요."
