name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

jobs:
  review:
    # fix/claude-* 브랜치는 Claude가 만든 수정 PR — 재리뷰 루프 방지
    if: "!startsWith(github.event.pull_request.head.ref, 'fix/claude-')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            PR #${{ github.event.pull_request.number }} 하네스 엔지니어링 리뷰를 수행하라.

            ## 절차
            1. `gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }}` 로 diff 가져오기
            2. `docs/decisions/`, `docs/failures/`, `AGENTS.md` 읽기
            3. 리뷰 작성 후 Write 도구로 `/tmp/review.md`에 저장
            4. 🔴 필수수정 항목이 있으면 `/tmp/has_critical.txt` 파일에 "true" 저장, 없으면 저장하지 않음

            ## 리뷰 기준
            1. **레이어 규칙**: Controller → Service → Repository → Model 단방향 의존성 위반
            2. **패키지 위치**: com.pettrip.{domain}.{controller|service|repository|model}
            3. **PK 정책**: @GeneratedValue 금지, UUID.randomUUID() 금지, BaseEntity 상속 필수
            4. **TDD**: Controller 추가 시 @WebMvcTest + REST Docs 스니펫 필수
            5. **Flyway**: 기존 마이그레이션 파일 수정 절대 금지
            6. **코드 품질**: 버그 가능성, 예외 처리, 성능

            ## 출력 형식 (한국어)
            - 심각도: 🔴 필수수정 / 🟡 권장 / 🟢 참고
            - 전체 요약 + 항목별 상세

      - name: Post review comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/review.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body-file /tmp/review.md
          fi

      - name: Auto-fix critical issues
        if: hashFiles('/tmp/has_critical.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FIX_BRANCH="fix/claude-${{ github.event.pull_request.number }}-$(date +%s)"
          git config user.name "claude[bot]"
          git config user.email "claude[bot]@users.noreply.github.com"
          git checkout -b "$FIX_BRANCH" origin/${{ github.event.pull_request.head.ref }}
          echo "$FIX_BRANCH" > /tmp/fix_branch.txt

      - uses: anthropics/claude-code-action@v1
        if: hashFiles('/tmp/has_critical.txt') != ''
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            `/tmp/review.md`에 기록된 🔴 필수수정 항목들을 코드에서 직접 수정하라.

            ## 절차
            1. `/tmp/review.md` 읽기
            2. 🔴 항목에 해당하는 코드 파일 수정
            3. 수정 완료 후 git commit (메시지: `fix: Claude 리뷰 필수수정 반영`)
            4. `git push origin $(cat /tmp/fix_branch.txt)`

            수정 범위: 🔴 필수수정 항목만. 🟡 권장은 건드리지 않는다.

      - name: Open fix PR
        if: hashFiles('/tmp/has_critical.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/fix_branch.txt ]; then
            FIX_BRANCH=$(cat /tmp/fix_branch.txt)
            BASE_BRANCH="${{ github.event.pull_request.head.ref }}"
            gh pr create \
              --repo ${{ github.repository }} \
              --head "$FIX_BRANCH" \
              --base "$BASE_BRANCH" \
              --title "fix: Claude 리뷰 필수수정 반영 (PR #${{ github.event.pull_request.number }})" \
              --body "PR #${{ github.event.pull_request.number }} 리뷰에서 발견된 🔴 필수수정 항목을 자동으로 수정한 PR입니다.

            원본 리뷰 내용은 PR #${{ github.event.pull_request.number }} 코멘트를 확인하세요.

            > ⚠️ 자동 생성된 PR입니다. 머지 전 반드시 내용을 확인하세요."
          fi
