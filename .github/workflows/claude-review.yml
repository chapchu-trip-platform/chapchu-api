name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: "true"
          allowed_tools: "Bash(gh pr*),Bash(gh api*),Bash(git*),Bash(cat*),Bash(find*),Read"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            이 PR의 변경된 코드를 아래 하네스 엔지니어링 기준으로 리뷰해줘. 한국어로 작성해.

            ## 필수 체크 항목
            1. **레이어 규칙**: Controller → Service → Repository → Model 단방향 의존성 위반 여부
            2. **패키지 위치**: com.pettrip.{domain}.{controller|service|repository|model} 준수 여부
            3. **PK 정책**: @GeneratedValue 사용 금지, UUID.randomUUID() 사용 금지, BaseEntity 상속 여부
            4. **TDD**: Controller 추가 시 @WebMvcTest 테스트 + REST Docs 스니펫 여부
            5. **Flyway**: 기존 마이그레이션 파일 수정 여부 (절대 금지)
            6. **일반 코드 품질**: 버그 가능성, 예외 처리 누락, 성능 이슈

            ## 리뷰 방식
            - 문제 있는 코드 라인에 인라인 코멘트
            - 심각도: 🔴 필수수정 / 🟡 권장 / 🟢 참고
            - 전체 요약은 PR 상단 코멘트로 한 번만
