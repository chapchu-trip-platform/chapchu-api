name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  harness-check:
    name: Harness Check (Spotless · Checkstyle · PMD · SpotBugs · ArchUnit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run harness check
        run: ./gradlew check
