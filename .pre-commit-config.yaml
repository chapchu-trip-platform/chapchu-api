repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
  - repo: local
    hooks:
      - id: java-harness-check
        name: Java Linter, GC & Architecture Check (Harness)
        entry: ./gradlew spotlessApply checkstyleMain spotbugsMain pmdMain test
        language: system
        pass_filenames: false
